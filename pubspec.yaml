name: dartvm_integration_tests
description: Run full app integration tests on the Dart VM with no devices, no drivers, no builds. Provides HTTP mocking, method channel mocking, a unified tester abstraction, and page object/flow patterns for fast, deterministic widget tests.
version: 0.0.1
homepage: https://github.com/felipe-fontes/dartvm-integration-test
repository: https://github.com/felipe-fontes/dartvm-integration-test
issue_tracker: https://github.com/felipe-fontes/dartvm-integration-test/issues

topics:
  - testing
  - integration-test
  - mocking
  - http-mock
  - flutter

environment:
  sdk: ^3.6.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  fake_http_client: ^2.0.0
  flutter_test:
    sdk: flutter
  patrol_finders: ^2.7.2

dev_dependencies:
  flutter_lints: ^5.0.0
  http: ^1.3.0
